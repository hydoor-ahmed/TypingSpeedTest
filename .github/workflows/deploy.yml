name: Deploy React App to GitHub Pages 🚀

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend # 👈 هذا يخلي كل الأوامر تتنفذ داخل مجلد المشروع
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies 📦
        run: npm install

      - name: Build project 🏗️
        run: npm run build
        # ملاحظة: تأكد إن الـ build folder بـ Vite يكون 'dist' وبـ CRA يكون 'build'

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          # نرفع المجلد الناتج من الـ build
          path: frontend/dist 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages 🌐
        id: deployment
        uses: actions/deploy-pages@v4
